<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="path-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5382a1"/>
      <stop offset="100%" stop-color="#f89820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5382a1" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#f89820" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f89820" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="64" cy="64" rx="40" ry="48" fill="url(#glow)"/>

  <!-- Roadmap path (winding S-curve connecting nodes) -->
  <path d="M38 102 C38 90, 90 90, 90 78 C90 66, 38 66, 38 54 C38 42, 90 42, 90 28"
        fill="none" stroke="url(#path-grad)" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Solid path on top -->
  <path d="M38 102 C38 90, 90 90, 90 78 C90 66, 38 66, 38 54 C38 42, 90 42, 90 28"
        fill="none" stroke="url(#path-grad)" stroke-width="3" stroke-linecap="round"
        opacity="0.25"/>

  <!-- Node 1 — Start (bottom) -->
  <circle cx="38" cy="102" r="7" fill="#21262d" stroke="#5382a1" stroke-width="2.5"/>
  <circle cx="38" cy="102" r="3" fill="#5382a1"/>

  <!-- Node 2 -->
  <circle cx="90" cy="78" r="7" fill="#21262d" stroke="#6a9bb5" stroke-width="2.5"/>
  <circle cx="90" cy="78" r="3" fill="#6a9bb5"/>

  <!-- Node 3 -->
  <circle cx="38" cy="54" r="7" fill="#21262d" stroke="#c48a30" stroke-width="2.5"/>
  <circle cx="38" cy="54" r="3" fill="#c48a30"/>

  <!-- Node 4 — Goal (top) -->
  <circle cx="90" cy="28" r="9" fill="#21262d" stroke="#f89820" stroke-width="2.5"/>
  <circle cx="90" cy="28" r="4.5" fill="#f89820"/>
  <!-- Goal glow -->
  <circle cx="90" cy="28" r="14" fill="#f89820" opacity="0.1"/>

  <!-- Tiny labels on nodes -->
  <text x="38" y="102" font-family="monospace" font-size="6" fill="#5382a1"
        text-anchor="middle" dominant-baseline="middle" opacity="0">1</text>

  <!-- Flag on goal node -->
  <path d="M90 20 L90 12 L100 15 L90 18" fill="#f89820" opacity="0.7"/>

  <!-- Border -->
  <rect width="128" height="128" rx="24" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
