<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="50%" style="stop-color:#2b2b2b"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f89820"/>
      <stop offset="100%" style="stop-color:#e08218"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="0"/>

  <!-- Coffee cup -->
  <g transform="translate(100, 40)">
    <!-- Steam -->
    <path d="M25 10 Q30 0, 25 -10 Q20 -20, 25 -30" fill="none" stroke="#5382a1" stroke-width="2.5" opacity="0.6"/>
    <path d="M40 15 Q45 5, 40 -5 Q35 -15, 40 -25" fill="none" stroke="#5382a1" stroke-width="2.5" opacity="0.4"/>
    <path d="M55 10 Q60 0, 55 -10 Q50 -20, 55 -30" fill="none" stroke="#5382a1" stroke-width="2.5" opacity="0.5"/>

    <!-- Cup body -->
    <rect x="10" y="20" width="70" height="80" rx="5" fill="url(#cup)"/>

    <!-- Cup handle -->
    <path d="M80 35 Q105 35, 105 60 Q105 85, 80 85" fill="none" stroke="#f89820" stroke-width="8" stroke-linecap="round"/>

    <!-- Cup rim -->
    <rect x="5" y="15" width="80" height="12" rx="4" fill="#e08218"/>

    <!-- Saucer -->
    <ellipse cx="45" cy="108" rx="55" ry="8" fill="#444"/>
  </g>

  <!-- Title -->
  <text x="240" y="80" font-family="monospace" font-size="48" font-weight="bold" fill="#f89820">Super Java Brain</text>

  <!-- Subtitle -->
  <text x="240" y="115" font-family="monospace" font-size="20" fill="#5382a1">Pure Java Handbook</text>

  <!-- Stats -->
  <text x="240" y="150" font-family="monospace" font-size="14" fill="#888">31 topics · 4 levels · basics → geek</text>

  <!-- Version badge -->
  <g transform="translate(660, 135)">
    <rect width="90" height="26" rx="13" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="45" y="17" font-family="monospace" font-size="12" fill="#f89820" text-anchor="middle">Java 21+</text>
  </g>
</svg>
